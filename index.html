<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>This is for you my love❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#ffd6e7,#fff6f9);
overflow-x:hidden;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-25px;
font-size:25px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* Start Screen */

.start{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.start h1{
font-size:3em;
color:#ff4d6d;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Envelope */

.envelope-container{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.envelope{
width:200px;
height:120px;
background:#ff8fab;
position:relative;
cursor:pointer;
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6b81;
transform-origin:top;
transition:0.6s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

/* Letter Section */

.letter-section{
display:none;
padding:40px;
justify-content:center;
align-items:flex-start;
flex-direction:row;
}

.letter{
width:40%;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
font-size:24px;
line-height:1.6;
}

/* Polaroids */

.polaroids{
width:20%;
display:flex;
flex-direction:column;
align-items:center;
}

.polaroid{
position:relative;
margin:20px;
}

.polaroid img{
width:140px;
background:white;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
border-radius:5px;
}

.polaroid:nth-child(odd){
transform:rotate(-6deg);
}

.polaroid:nth-child(even){
transform:rotate(6deg);
}

/* Golden fairy lights */

.light{
width:8px;
height:8px;
background:gold;
border-radius:50%;
position:absolute;
animation:blink 1s infinite alternate;
}

@keyframes blink{
from{opacity:0.3}
to{opacity:1}
}

</style>
</head>

<body>

<script>

/* Floating hearts */

setInterval(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=Math.random()*20+15+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),8000)

},500)

</script>

<!-- Start Screen -->

<div class="start" id="start">

<h1>Happy Birthday My Love ❤️</h1>

<button onclick="startGift()">Click here for a surprise gift</button>

</div>

<!-- Envelope -->

<div class="envelope-container" id="envelopeContainer">

<div class="envelope" onclick="openLetter()" id="envelope">
<div class="flap"></div>
</div>

<p>Click the envelope 💌</p>

</div>

<!-- Letter Section -->

<div class="letter-section" id="letterSection">

<div class="polaroids">

<div class="polaroid">
<img src="photo1.jpg">
<span class="light" style="top:-5px;left:-5px"></span>
<span class="light" style="top:-5px;right:-5px"></span>
</div>

<div class="polaroid">
<img src="photo2.jpg">
<span class="light" style="bottom:-5px;left:-5px"></span>
<span class="light" style="bottom:-5px;right:-5px"></span>
</div>

<div class="polaroid">
<img src="photo3.jpg">
</div>

<div class="polaroid">
<img src="photo4.jpg">
</div>

<div class="polaroid">
<img src="photo5.jpg">
</div>

<div class="polaroid">
<img src="photo6.jpg">
</div>

</div>

<div class="letter">

<h2>My Love ❤️</h2>

<p id="typed"></p>

<h3 style="color:#ff4d6d">
I'm so lucky to have you as my wife
</h3>

</div>

<div class="polaroids">

<div class="polaroid"><img src="photo7.jpg"></div>
<div class="polaroid"><img src="photo8.jpg"></div>
<div class="polaroid"><img src="photo9.jpg"></div>
<div class="polaroid"><img src="photo10.jpg"></div>
<div class="polaroid"><img src="photo11.jpg"></div>
<div class="polaroid"><img src="photo12.jpg"></div>

</div>

</div>

<script>

/* Button click */

function startGift(){

document.getElementById("start").style.display="none"
document.getElementById("envelopeContainer").style.display="flex"

}

/* Envelope click */

function openLetter(){

document.getElementById("envelope").classList.add("open")

setTimeout(()=>{

document.getElementById("envelopeContainer").style.display="none"
document.getElementById("letterSection").style.display="flex"

typeLetter()

},800)

}

/* Typing animation */

let text=`Today is your special day, but honestly,
every day with you feels special.

You are my happiness, my peace,
and the most beautiful part of my life.

Every memory with you is a treasure,
and I can't wait to create thousands more.

Happy Birthday to the person
who makes my world brighter ❤️
`

let i=0

function typeLetter(){

function typing(){

if(i<text.length){

document.getElementById("typed").innerHTML+=text.charAt(i)

i++

setTimeout(typing,40)

}

}

typing()

}

</script>

</body>
</html>

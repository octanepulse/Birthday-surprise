<!DOCTYPE html>
<html>

<head>
<title>Happy Birthday 🎂</title>

<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(120deg,#ff9a9e,#fad0c4);
color:white;
padding-top:120px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4b6e;
cursor:pointer;
}

#message{
margin-top:30px;
font-size:22px;
}
</style>

</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>

<p>I made a little surprise website for you</p>

<button onclick="showMessage()">Open your surprise</button>

<p id="message"></p>

<script>
function showMessage(){
document.getElementById("message").innerHTML =
"You make the world brighter. I hope this birthday is as amazing as you are ❤️";
}
</script>

</body>

</html>

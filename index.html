<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Dancing+

<title>Hey this is for you!❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#ffd6e7,#fff6f9);
overflow-x:hidden;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-25px;
font-size:25px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* Start Screen */

.start{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.start h1{
font-size:3em;
color:#ff4d6d;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Envelope */

.envelope-container{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.envelope{
width:320px;
height:190px;
background:#ff8fab;
position:relative;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0,2);
animation:floatEnvelope 3s ease-in-out infinite;
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6b81;
transform-origin:top;
transition:0.6s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

@keyframes floatEnvelope{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

/* Letter Section */

.letter-section{
display:none;
padding:40px;
justify-content:center;
align-items:flex-start;
flex-direction:row;
}

.letter{
width:40%;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
font-size:24px;
line-height:1.6;
}

#typed{
font-family:'Dancing Script', cursive;
font-size:26px;
line-height:1.8;
}

/* Polaroids */

.polaroids{
width:20%;
display:flex;
flex-direction:column;
align-items:center;
}

.polaroid{
position:relative;
margin:20px;
}

.polaroids img{
width:160px;
background:white;
padding:12px 12px 25px 12px;
margin:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
border-radius:5px;
position:relative;
}

/* Golden fairy lights around photos */

.polaroids img::before,
.polaroids img::after{
content:"";
position:absolute;
width:8px;
height:8px;
background:gold;
border-radius:50%;
box-shadow:
0 0 8px gold,
0 0 12px gold;
animation:blinkLight 1s infinite alternate;
}

.polaroids img::before{
top:-6px;
left:-6px;
}

.polaroids img::after{
bottom:-6px;
right:-6px;
}

@keyframes blinkLight{
from{opacity:0.4}
to{opacity:1}
}

.polaroid:nth-child(odd){
transform:rotate(-6deg);
}

.polaroid:nth-child(even){
transform:rotate(6deg);
}

/* Golden fairy lights */

.light{
width:8px;
height:8px;
background:gold;
border-radius:50%;
position:absolute;
animation:blink 1s infinite alternate;
}

@keyframes blink{
from{opacity:0.3}
to{opacity:1}
}

/* Blinking typing cursor */

.cursor{
display:inline-block;
margin-left:4px;
width:2px;
background:#ff4d6d;
animation:blink 1s infinite;
}

@keyframes cursorBlink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body>

<script>

/* Floating hearts */

setInterval(()=>{

heart.innerHTML="❤️"

heart.style.fontSize=Math.random()*20+15+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),8000)

},500)

</script>

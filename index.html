<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Website❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#ffd6e7,#fff6f9);
overflow-x:hidden;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* Start Screen */

.start{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.start h1{
font-size:3em;
color:#ff4d6d;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Envelope */

.envelope-container{
display:none;
height:100vh;
justify-content:center;
align-items:center;
}

.envelope{
width:200px;
height:120px;
background:#ff8fab;
position:relative;
cursor:pointer;
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6b81;
transform-origin:top;
transition:0.6s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

/* Letter Section */

.letter-section{
display:none;
padding:40px;
display:flex;
justify-content:center;
}

.letter{
width:40%;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
font-size:18px;
}

/* Polaroids */

.polaroids{
width:20%;
display:flex;
flex-direction:column;
align-items:center;
}

.polaroids img{
width:140px;
background:white;
padding:10px;
margin:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
border-radius:5px;
}

.polaroids img:nth-child(odd){
transform:rotate(-6deg);
}

.polaroids img:nth-child(even){
transform:rotate(6deg);
}

/* Fairy lights */

.light{
width:8px;
height:8px;
background:gold;
border-radius:50%;
position:absolute;
animation:blink 1s infinite alternate;
}

@keyframes blink{
from{opacity:0.3}
to{opacity:1}
}

</style>
</head>

<body>

<!-- Floating hearts -->
<script>
setInterval(()=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=Math.random()*20+15+"px"
document.body.appendChild(heart)

setTimeout(()=>heart.remove(),8000)

},500)
</script>

<!-- Start Screen -->

<div class="start" id="start">

<h1>Happy Birthday My Love !! ❤️</h1>

<button onclick="startGift()">Click here for a surprise gift</button>

</div>

<!-- Envelope -->

<div class="envelope-container" id="envelopeContainer">

<div class="envelope" onclick="openLetter()" id="envelope">

<div class="flap"></div>

</div>

<p style="text-align:center">Click the envelope 💌</p>

</div>

<!-- Letter Section -->

<div class="letter-section" id="letterSection">

<div class="polaroids">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">

</div>

<div class="letter">

<h2>My Love ❤️</h2>

<p id="typed"></p>

<h3 style="color:#ff4d6d">
I'm so lucky to have you as my wife
</h3>

</div>

<div class="polaroids">

<img src="photo7.jpg">
<img src="photo8.jpg">
<img src="photo9.jpg">
<img src="photo10.jpg">
<img src="photo11.jpg">
<img src="photo12.jpg">

</div>

</div>

<script>

function startGift(){

document.getElementById("start").style.display="none"
document.getElementById("envelopeContainer").style.display="flex"

confetti()

}

function openLetter(){

document.getElementById("envelope").classList.add("open")

setTimeout(()=>{

document.getElementById("envelopeContainer").style.display="none"
document.getElementById("letterSection").style.display="flex"

typeLetter()

},800)

}

/* Confetti */

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div")

c.style.position="fixed"
c.style.width="8px"
c.style.height="8px"
c.style.background="red"
c.style.left=Math.random()*100+"vw"
c.style.top="-10px"

document.body.appendChild(c)

let fall=setInterval(()=>{

c.style.top=parseInt(c.style.top)+4+"px"

if(parseInt(c.style.top)>window.innerHeight){
clearInterval(fall)
c.remove()
}

},20)

}

}

/* Typing animation */

let text=`Today is your special day, but honestly,
every day with you feels special.

You are my happiness, my peace,
and the most beautiful part of my life.

Every memory with you is a treasure,
and I can't wait to create thousands more.

Happy Birthday to the person
who makes my world brighter ❤️
`

let i=0

function typeLetter(){

let speed=40

function typing(){

if(i<text.length){

document.getElementById("typed").innerHTML+=text.charAt(i)

i++

setTimeout(typing,speed)

}

}

typing()

}

</script>

</body>
</html>

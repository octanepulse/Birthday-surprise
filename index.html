<!DOCTYPE html>
<html>

<head>
<title>Happy Birthday Kavya❤️🎂</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(120deg,#ff9a9e,#fad0c4);
color:white;
padding-top:120px;
}

h1{
font-size:48px;
}

button{
padding:14px 28px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:#ff4b6e;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#message{
margin-top:30px;
font-size:24px;
}

</style>

</head>

<body>

<h1>🎉 Happy Birthday My dear love!!!🎉</h1>

<p>I made a small surprise on the internet just for you</p>

<button onclick="showMessage()">🎁 Open your birthday surprise</button>
  <p id="message"></p>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function showMessage(){

document.getElementById("message").innerHTML =
"🎂 Happy Birthday! I hope today is filled with laughter, surprises, and everything that makes you smile ❤️";

confetti({
particleCount: 200,
spread: 120,
origin: { y: 0.6 }
});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<title>Happy Birthday ❤️🎂</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(120deg,#ff9a9e,#fad0c4);
color:white;
padding-top:120px;
}

h1{
font-size:48px;
}

button{
padding:14px 28px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:#ff4b6e;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#message{
margin-top:30px;
font-size:24px;
}
/* hide gallery initially */

.gallery{
display:none;
position:fixed;
top:120px;
left:0;
right:0;
pointer-events:none;
}

/* left side polaroids */

.gallery img:nth-child(1){
position:absolute;
left:40px;
top:0;
transform:rotate(-8deg);
}

.gallery img:nth-child(2){
position:absolute;
left:60px;
top:220px;
transform:rotate(6deg);
}

/* right side polaroids */

.gallery img:nth-child(3){
position:absolute;
right:60px;
top:50px;
transform:rotate(7deg);
}

.gallery img:nth-child(4){
position:absolute;
right:40px;
top:260px;
transform:rotate(-6deg);
}

/* polaroid style + golden glow */

.gallery img{
width:180px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:
0 8px 18px rgba(0,0,0,0.25),
0 0 12px rgba(255,215,120,0.7),
0 0 25px rgba(255,215,120,0.4);
}

</style>

</head>

<body>

<h1>🎉 Happy Birthday My dear love!!!🎉</h1>

<p>I made a small surprise on the internet just for you</p>

<button onclick="showMessage()">🎁 Open your birthday surprise</button>
  <p id="message"></p>
  <h2>Some Memories 📸</h2>

<div id="gallery" class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function showMessage(){

document.getElementById("message").innerHTML =
"🎂 Happy Birthday! I hope today is filled with laughter, surprises, and everything that makes you smile ❤️";

confetti({
particleCount: 200,
spread: 120,
origin: { y: 0.6 }
});

document.getElementById("gallery").style.display="block";

}

</script>

</body>
</html>
